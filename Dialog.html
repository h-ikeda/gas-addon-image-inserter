<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: 'Helvetica Neue', Arial, sans-serif; padding: 15px; color: #333; font-size: 13px; }
      .file-drop-area {
        border: 2px dashed #1a73e8; border-radius: 6px; padding: 30px 15px;
        text-align: center; background-color: #f8f9fa; cursor: pointer; margin-bottom: 15px;
      }
      .file-drop-area:hover { background-color: #f1f3f4; }
      .btn-submit {
        background-color: #1a73e8; color: white; border: none; padding: 10px 16px;
        border-radius: 4px; cursor: pointer; font-weight: 500; width: 100%;
      }
      .btn-submit:disabled { background-color: #dadce0; cursor: not-allowed; }
      #status { margin-top: 10px; color: #666; text-align: center; font-weight: bold; }
    </style>
  </head>
  <body>
    <div>
      <p>ローカル、またはPCと同期しているGoogleドライブ等から画像を複数選択してください。</p>
      
      <div class="file-drop-area" onclick="document.getElementById('fileInput').click()">
        <span>ここをクリックしてファイルを選択（複数可）</span>
        <input type="file" id="fileInput" multiple accept="image/*" style="display:none" onchange="updateFileStatus()">
      </div>
      
      <div id="status">ファイルが選択されていません</div>
      <button id="submitBtn" class="btn-submit" onclick="uploadFiles()" disabled>ドキュメントに挿入する</button>
    </div>

    <script>
      function updateFileStatus() {
        const input = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const btn = document.getElementById('submitBtn');
        if (input.files.length > 0) {
          status.innerText = input.files.length + ' 個のファイルが選択されています';
          status.style.color = '#1a73e8';
          btn.disabled = false;
        } else {
          status.innerText = 'ファイルが選択されていません';
          btn.disabled = true;
        }
      }

      // Google Docs がそのまま受け付ける形式（'image/jpg' は非標準だが一部環境で報告される）
      const SUPPORTED_TYPES = ['image/png', 'image/jpeg', 'image/jpg', 'image/gif'];

      // ファイルを Data URL として読み込む
      function readAsDataURL(file) {
        return new Promise(function(resolve, reject) {
          const reader = new FileReader();
          reader.onload = function(e) { resolve(e.target.result); };
          reader.onerror = function() { reject(new Error('「' + file.name + '」の読み込みに失敗しました。')); };
          reader.readAsDataURL(file);
        });
      }

      // canvas を使って Data URL の画像を PNG に変換する
      function convertToPng(dataUrl, name) {
        return new Promise(function(resolve, reject) {
          const img = new Image();
          img.onload = function() {
            try {
              const canvas = document.createElement('canvas');
              canvas.width = img.naturalWidth;
              canvas.height = img.naturalHeight;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0);
              const pngData = canvas.toDataURL('image/png');
              const baseName = name.replace(/\.[^.]+$/, '');
              resolve({ name: baseName + '.png', type: 'image/png', data: pngData });
            } catch (e) {
              reject(new Error('「' + name + '」の変換に失敗しました。'));
            }
          };
          img.onerror = function() {
            reject(new Error('「' + name + '」はこのブラウザで表示できない形式のため変換できません（HEIC/TIFF は Chrome では非対応です。Safari をお使いください）。'));
          };
          img.src = dataUrl;
        });
      }

      // 1ファイルを Docs 対応形式に整える
      async function processFile(file) {
        const dataUrl = await readAsDataURL(file);
        // 対応形式はそのまま、それ以外（BMP/TIFF/HEIC など）は PNG に変換
        if (SUPPORTED_TYPES.includes(file.type)) {
          return { name: file.name, type: file.type, data: dataUrl };
        }
        return convertToPng(dataUrl, file.name);
      }

      async function uploadFiles() {
        const input = document.getElementById('fileInput');
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status');

        btn.disabled = true;
        status.style.color = '#1a73e8';
        status.innerText = '画像を最適化して処理中...';

        let filesData;
        try {
          filesData = await Promise.all([...input.files].map(processFile));
        } catch (err) {
          status.innerText = 'エラー: ' + err.message;
          status.style.color = '#d93025';
          btn.disabled = false;
          return;
        }

        google.script.run
          .withSuccessHandler(function(msg) {
            status.innerText = msg;
            btn.disabled = false;
            setTimeout(function() { google.script.host.close(); }, 1200);
          })
          .withFailureHandler(function(err) {
            status.innerText = 'エラー: ' + err.message;
            status.style.color = '#d93025';
            btn.disabled = false;
          })
          .insertSelectedImages(filesData);
      }
    </script>
  </body>
</html>
