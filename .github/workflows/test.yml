name: Test

on:
  push:
    branches:
      - main  # mainへのpush時に実行
  pull_request:  # 全てのプルリクエストで実行

# GITHUB_TOKEN の権限を最小限（リポジトリの読み取りのみ）に制限する
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'  # package-lock.json を元に依存をキャッシュ

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
