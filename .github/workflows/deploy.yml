name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Middleware Webhook
        run: |
          curl -X POST "${{ secrets.MIDDLEWARE_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "token": "${{ secrets.MIDDLEWARE_TOKEN }}",
              "repository": "${{ github.repository }}",
              "ref": "${{ github.sha }}"
            }'
