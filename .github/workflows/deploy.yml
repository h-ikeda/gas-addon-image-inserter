name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main  # mainブランチにpushされたら実行

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Create clasprc.json
        run: |
          echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      # 【新しく追加】CI実行時だけ、.clasp.jsonの中身を本物のスクリプトIDに置き換える
      - name: Inject Script ID
        run: |
          sed -i 's/SCRIPT_ID_PLACEHOLDER/${{ secrets.GAS_SCRIPT_ID }}/g' .clasp.json

      - name: Clasp Push
        run: clasp push -f

      - name: Clasp Deploy
        run: clasp deploy -i ${{ secrets.GAS_DEPLOYMENT_ID }} -d "Auto deploy from GitHub Actions"
